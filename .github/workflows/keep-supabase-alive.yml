# ═══════════════════════════════════════════════════════════════════
# Keep Supabase project alive — prevent auto-pause on free tier
# Runs daily, sends REST + Auth health pings (with retry) to register activity
# ═══════════════════════════════════════════════════════════════════

name: Keep Supabase Alive

on:
  schedule:
    # Runs at 08:00 UTC every day (off-peak time to avoid GitHub Actions delays)
    - cron: "0 8 * * *"
  workflow_dispatch: # Allow manual trigger

jobs:
  ping-supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        run: |
          echo "Pinging REST API using Node to simulate real client..."
          node -e "
            async function pingWithRetry(url, options, label, attempts = 3, delayMs = 5000) {
              for (let i = 1; i <= attempts; i++) {
                try {
                  const r = await fetch(url, options);
                  console.log(label + ' Status:', r.status, '(attempt ' + i + ')');
                  if (r.ok) return;
                  throw new Error(label + ' returned ' + r.status);
                } catch (e) {
                  console.error('Attempt ' + i + ' failed:', e.message);
                  if (i === attempts) { console.error(label + ' failed after ' + attempts + ' attempts'); process.exit(1); }
                  await new Promise(res => setTimeout(res, delayMs));
                }
              }
            }
            pingWithRetry(
              'https://lmcmqwzjteylqegotrdi.supabase.co/rest/v1/portfolio_data?id=eq.1&select=id',
              {
                headers: {
                  'apikey': '${{ secrets.SUPABASE_ANON_KEY }}',
                  'Authorization': 'Bearer ${{ secrets.SUPABASE_ANON_KEY }}',
                  'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36'
                }
              },
              'Database Ping'
            );
          "

      - name: Ping Supabase Auth health endpoint
        run: |
          echo "Pinging Auth health endpoint using Node..."
          node -e "
            async function pingWithRetry(url, options, label, attempts = 3, delayMs = 5000) {
              for (let i = 1; i <= attempts; i++) {
                try {
                  const r = await fetch(url, options);
                  console.log(label + ' Status:', r.status, '(attempt ' + i + ')');
                  if (r.ok) return;
                  throw new Error(label + ' returned ' + r.status);
                } catch (e) {
                  console.error('Attempt ' + i + ' failed:', e.message);
                  if (i === attempts) { console.error(label + ' failed after ' + attempts + ' attempts'); process.exit(1); }
                  await new Promise(res => setTimeout(res, delayMs));
                }
              }
            }
            pingWithRetry(
              'https://lmcmqwzjteylqegotrdi.supabase.co/auth/v1/health',
              {
                headers: {
                  'apikey': '${{ secrets.SUPABASE_ANON_KEY }}',
                  'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36'
                }
              },
              'Auth Ping'
            );
          "
